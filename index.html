<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="LZjaM7lW2S7YvskDKLvJAi2N2vlxifUBVWwaDCG-Ajg" />

<title>ITS CALVIA - Premium Water Delivery</title>

<!-- PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background:#f9fbff;
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#007BFF;
    color:white;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo { display:flex; align-items:center; gap:10px; }
.logo img { height:40px; }

/* HERO */
.hero {
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('hero.jpg');
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

.hero h1 { font-size:40px; }

.btn {
    background:#00c6ff;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    display:inline-block;
    margin-top:20px;
}

/* SECTION */
.section {
    padding:80px 20px;
    text-align:center;
}

/* PRODUCT GALLERY */
.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.card {
    width:250px;
    border-radius:15px;
    overflow:hidden;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.4s;
}

.card:hover {
    transform:translateY(-10px) scale(1.03);
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3 {
    margin:15px;
}

/* WHY */
.why {
    background:#eef6ff;
}

.why-box {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
}

.why-item {
    width:200px;
    background:white;
    padding:20px;
    border-radius:10px;
}

/* SCROLL ANIMATION */
.fade {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.fade.show {
    opacity:1;
    transform:translateY(0);
}

/* CONTACT */
.contact {
    padding:60px;
    background:#007BFF;
    color:white;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:18px;
    border-radius:50%;
    font-size:22px;
    text-decoration:none;
}

/* POPUP */
.popup {
    position:fixed;
    bottom:90px;
    right:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    display:none;
}

@media(max-width:768px){
    .hero h1 { font-size:28px; }
}
</style>

</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
<h2>ITS CALVIA</h2>
</div>
<a href="#contact" class="btn">Order</a>
</header>

<!-- HERO -->
<section class="hero fade">
<div>
<h1>Pure Drinking Water for a Healthy Life</h1>
<p>Fast Delivery in Darbhanga</p>
<a href="#contact" class="btn">Order Now</a>
</div>
</section>

<!-- PRODUCTS -->
<section class="section fade">
<h2>Our Products</h2>

<div class="products">

<div class="card">
<img src="bottle.jpg">
<h3>20L Jar</h3>
</div>

<div class="card">
<img src="bottle.jpg">
<h3>1L Bottle</h3>
</div>

<div class="card">
<img src="bottle.jpg">
<h3>500ml Bottle</h3>
</div>

</div>
</section>

<!-- WHY -->
<section class="section why fade">
<h2>Why Choose Us</h2>

<div class="why-box">
<div class="why-item">💧 Pure Water</div>
<div class="why-item">🚚 Fast Delivery</div>
<div class="why-item">💰 Affordable</div>
<div class="why-item">⭐ Trusted</div>
</div>
</section>

<!-- CONTACT -->
<section class="contact fade" id="contact">
<h2>Order Now</h2>
<p>Call: 6204588168</p>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" onclick="togglePopup()">💬</a>

<div class="popup" id="popup">
<p>Need Water? 💧</p>
<a href="https://wa.me/916204588168?text=I%20want%20water" class="btn">Chat Now</a>
</div>

<script>
/* SCROLL ANIMATION */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

/* WHATSAPP POPUP */
function togglePopup(){
  const popup = document.getElementById("popup");
  popup.style.display = popup.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
